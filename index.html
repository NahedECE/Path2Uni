<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path2Uni | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #05050f, #0a0a1a, #0d0d22);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
  }
  .login-container {
    background: rgba(10,10,26,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 32px;
    padding: 2rem;
    width: 100%;
    max-width: 450px;
    margin: 20px;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 1.5rem;
    background: linear-gradient(120deg, #fff, #a0a0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .tab {
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    color: rgba(255,255,255,0.5);
    transition: all 0.2s;
  }
  .tab.active { color: white; border-bottom: 2px solid #3b82f6; }
  .form { display: none; }
  .form.active { display: block; }
  .field { margin-bottom: 1rem; }
  .field label { font-size: 12px; color: rgba(255,255,255,0.6); display: block; margin-bottom: 6px; }
  .field input {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: white;
  }
  button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #3b82f6, #7c3aed);
    border: none;
    border-radius: 30px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
  }
  .hint { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 1rem; }
  .error { color: #f87171; text-align: center; margin-top: 0.5rem; display: none; }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">Path2Uni</div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="admin@path2uni.com" required></div>
    <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter password" required></div>
    <button type="submit">Login</button>
    <div class="error" id="loginError"></div>
    <div class="hint">Demo: admin@path2uni.com / admin123</div>
  </form>

  <form id="registerForm" class="form" onsubmit="handleRegister(event)">
    <div class="field"><label>Full Name</label><input type="text" id="regName" required></div>
    <div class="field"><label>Email</label><input type="email" id="regEmail" required></div>
    <div class="field"><label>Password (min 6 chars)</label><input type="password" id="regPassword" required></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="regConfirm" required></div>
    <button type="submit">Create Account</button>
    <div class="error" id="regError"></div>
  </form>
</div>

<script>
const API_URL = 'https://path2uni-236v.onrender.com/api';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  if (tab === 'login') {
    document.querySelector('.tab:first-child').classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  } else {
    document.querySelector('.tab:last-child').classList.add('active');
    document.getElementById('registerForm').classList.add('active');
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errorDiv = document.getElementById('loginError');
  errorDiv.style.display = 'none';
  
  try {
    const response = await fetch(`${API_URL}/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await response.json();
    if (response.ok) {
      localStorage.setItem('path2uni_token', data.token);
      localStorage.setItem('path2uni_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } else {
      errorDiv.textContent = data.error || 'Login failed';
      errorDiv.style.display = 'block';
    }
  } catch(e) {
    errorDiv.textContent = 'Connection error';
    errorDiv.style.display = 'block';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  const errorDiv = document.getElementById('regError');
  errorDiv.style.display = 'none';
  
  if (password !== confirm) { errorDiv.textContent = 'Passwords do not match'; errorDiv.style.display = 'block'; return; }
  if (password.length < 6) { errorDiv.textContent = 'Password must be at least 6 characters'; errorDiv.style.display = 'block'; return; }
  
  try {
    const response = await fetch(`${API_URL}/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await response.json();
    if (response.ok) {
      localStorage.setItem('path2uni_token', data.token);
      localStorage.setItem('path2uni_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } else {
      errorDiv.textContent = data.error || 'Registration failed';
      errorDiv.style.display = 'block';
    }
  } catch(e) {
    errorDiv.textContent = 'Connection error';
    errorDiv.style.display = 'block';
  }
}
</script>
</body>
</html>
