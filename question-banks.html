<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Banks | Path2Uni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .qb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  .qb-card {
    background: rgba(10,10,26,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 1.5rem;
    transition: all 0.3s;
  }
  .qb-card:hover {
    transform: translateY(-5px);
    border-color: rgba(59,130,246,0.3);
  }
  .qb-card h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    margin-bottom: 0.5rem;
  }
  .qb-meta {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin: 0.5rem 0;
  }
  .pdf-link {
    display: inline-block;
    margin-top: 1rem;
    padding: 8px 16px;
    background: rgba(59,130,246,0.2);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 30px;
    color: #60a5fa;
    text-decoration: none;
    font-size: 12px;
    transition: all 0.2s;
  }
  .pdf-link:hover {
    background: rgba(59,130,246,0.4);
    color: white;
  }
  .filter-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .filter-bar select, .filter-bar input {
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px;
    color: white;
  }
  .filter-bar select { flex: 1; }
  .filter-bar input { flex: 2; }
  .loading {
    text-align: center;
    padding: 2rem;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="page-wrap">

  <nav class="navbar">
    <div class="logo">Path2Uni</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="eligibility.html" class="nav-link">Eligibility Checker</a>
      <a href="admission-calendar.html" class="nav-link">Admission Calendar</a>
      <a href="study-tracker.html" class="nav-link">Study Tracker</a>
      <a href="circular-archive.html" class="nav-link">Circular Archive</a>
      <a href="question-banks.html" class="nav-link">Question Banks</a>
      <a href="application-status.html" class="nav-link">Application Status</a>
      <a href="#" class="nav-link" onclick="showContactAlert()">Contact Us</a>
      <a href="#" class="nav-link logout-btn" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">Previous Year Question Banks</div>
    <h1>Question<br>Banks</h1>
    <p>Download previous year question papers to prepare for your admission tests.</p>
  </div>

  <div class="glass-card">
    <div class="filter-bar">
      <select id="filterUniversity" onchange="loadQuestionBanks()">
        <option value="">All Universities</option>
        <option value="BUET">BUET</option>
        <option value="DU">DU</option>
        <option value="RUET">RUET</option>
        <option value="CUET">CUET</option>
        <option value="KUET">KUET</option>
        <option value="Medical">Medical</option>
        <option value="RU">RU</option>
        <option value="CU">CU</option>
        <option value="JU">JU</option>
      </select>
      <input type="text" id="searchInput" placeholder="🔍 Search by title or subject..." onkeyup="filterQuestionBanks()">
    </div>
    
    <div id="qbList" class="qb-grid">
      <div class="loading">Loading question banks...</div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://path2uni-236v.onrender.com/api';
const BASE_URL = 'https://path2uni-236v.onrender.com';
let authToken = localStorage.getItem('path2uni_token');
let allQuestions = [];

const user = JSON.parse(localStorage.getItem('path2uni_user') || '{}');
const isAdmin = user.isAdmin === true || user.is_admin === true || user.is_admin === 1;
if (isAdmin) {
  document.querySelector('.nav-links').innerHTML += '<a href="admin-dashboard.html" class="nav-link">Admin Panel</a>';
}

if (!authToken) {
  window.location.href = 'index.html';
}

async function loadQuestionBanks() {
  try {
    const university = document.getElementById('filterUniversity').value;
    let url = `${API_URL}/question-banks`;
    if (university) url += `?university=${encodeURIComponent(university)}`;
    
    const response = await fetch(url);
    const data = await response.json();
    allQuestions = data.questions || [];
    displayQuestionBanks(allQuestions);
  } catch(e) {
    console.error('Error loading question banks:', e);
    document.getElementById('qbList').innerHTML = '<div class="loading">Error loading question banks</div>';
  }
}

// FIXED: PDF links use BASE_URL not API_URL
function displayQuestionBanks(questions) {
  const container = document.getElementById('qbList');
  if (!questions.length) {
    container.innerHTML = '<div class="loading">No question banks available</div>';
    return;
  }
  
  container.innerHTML = questions.map(q => {
    const pdfUrl = q.pdf_path.startsWith('http') ? q.pdf_path : `${BASE_URL}${q.pdf_path}`;
    return `
      <div class="qb-card">
        <h3>${escapeHtml(q.title || q.university + ' ' + (q.subject || 'Question'))}</h3>
        <div class="qb-meta">🏛️ ${escapeHtml(q.university)}</div>
        <div class="qb-meta">📚 Subject: ${q.subject || 'General'}</div>
        <div class="qb-meta">📅 Year: ${q.year || 'N/A'}</div>
        <a href="${pdfUrl}" target="_blank" class="pdf-link">📄 Download PDF</a>
      </div>
    `;
  }).join('');
}

function filterQuestionBanks() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allQuestions.filter(q => 
    (q.title && q.title.toLowerCase().includes(searchTerm)) ||
    (q.subject && q.subject.toLowerCase().includes(searchTerm)) ||
    (q.university && q.university.toLowerCase().includes(searchTerm))
  );
  displayQuestionBanks(filtered);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function showContactAlert() {
  alert('Contact Us:\n\nEmail: support@path2uni.com\nPhone: +880 1234 567890');
}

async function logout() {
  await fetch(`${API_URL}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${authToken}` } });
  localStorage.removeItem('path2uni_token');
  localStorage.removeItem('path2uni_user');
  window.location.href = 'index.html';
}

loadQuestionBanks();
</script>
</body>
</html>
