<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Banks | Path2Uni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #05050f, #0a0a1a, #0d0d22);
    min-height: 100vh;
    color: white;
  }
  .bg-mesh { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08) 0%, transparent 50%); pointer-events: none; }
  .page-wrap { position: relative; max-width: 1000px; margin: 0 auto; padding: 1.5rem; z-index: 1; }
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.5rem;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(120deg, #fff, #a0a0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .nav-link {
    padding: 0.5rem 1rem;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.2s;
    border-radius: 30px;
  }
  .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
  .glass-card {
    background: rgba(10,10,26,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 1.5rem;
  }
  .filter-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .filter-bar select, .filter-bar input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px;
    color: white;
  }
  .admin-upload {
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    display: none;
  }
  .admin-upload input, .admin-upload select {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: white;
    margin-bottom: 0.5rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  button {
    background: linear-gradient(135deg, #3b82f6, #7c3aed);
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
  }
  .qb-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    margin-bottom: 0.75rem;
  }
  .qb-info h4 { font-size: 16px; margin-bottom: 4px; }
  .qb-meta { font-size: 11px; color: #fcd34d; margin-top: 4px; }
  @media (max-width: 700px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="page-wrap">
  <nav class="navbar">
    <div class="logo">Path2Uni</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="eligibility.html" class="nav-link">Eligibility Checker</a>
      <a href="admission-calendar.html" class="nav-link">Admission Calendar</a>
      <a href="study-tracker.html" class="nav-link">Study Tracker</a>
      <a href="circular-archive.html" class="nav-link">Circular Archive</a>
      <a href="question-banks.html" class="nav-link">Question Banks</a>
      <a href="application-status.html" class="nav-link">Application Status</a>
      <a href="#" class="nav-link logout-btn" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="glass-card">
    <div class="filter-bar">
      <select id="filterUniversity" onchange="loadQuestionBanks()">
        <option value="">All Universities</option>
        <option value="BUET">BUET</option><option value="DU">DU</option><option value="RUET">RUET</option>
        <option value="CUET">CUET</option><option value="KUET">KUET</option><option value="Medical">Medical</option>
        <option value="RU">RU</option><option value="CU">CU</option><option value="JU">JU</option>
      </select>
      <select id="filterSubject" onchange="loadQuestionBanks()">
        <option value="">All Subjects</option>
        <option value="Mathematics">Mathematics</option><option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option><option value="Biology">Biology</option>
        <option value="English">English</option>
      </select>
    </div>

    <div id="adminUploadPanel" class="admin-upload">
      <h3>Admin: Upload Question Bank</h3>
      <div class="form-row">
        <input type="text" id="qbTitle" placeholder="Title (e.g., BUET Admission Question 2024)">
        <select id="qbUniversity"><option value="BUET">BUET</option><option value="DU">DU</option><option value="RUET">RUET</option><option value="CUET">CUET</option><option value="KUET">KUET</option><option value="Medical">Medical</option></select>
      </div>
      <div class="form-row">
        <select id="qbSubject"><option value="Mathematics">Mathematics</option><option value="Physics">Physics</option><option value="Chemistry">Chemistry</option><option value="Biology">Biology</option><option value="English">English</option></select>
        <input type="number" id="qbYear" placeholder="Year (e.g., 2024)">
      </div>
      <input type="file" id="qbPdf" accept=".pdf">
      <button onclick="uploadQuestionBank()">Upload PDF</button>
    </div>

    <div id="qbList"><div class="loading">Loading question banks...</div></div>
  </div>
</div>

<script>
const API_URL = 'https://path2uni-236v.onrender.com/api';
let authToken = localStorage.getItem('path2uni_token');

async function apiCall(endpoint, options = {}) {
  const headers = {};
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
  if (response.status === 401) { localStorage.removeItem('path2uni_token'); window.location.href = 'index.html'; }
  return response;
}

async function loadQuestionBanks() {
  const university = document.getElementById('filterUniversity').value;
  const subject = document.getElementById('filterSubject').value;
  let url = '/question-banks';
  const params = [];
  if (university) params.push(`university=${encodeURIComponent(university)}`);
  if (subject) params.push(`subject=${encodeURIComponent(subject)}`);
  if (params.length) url += `?${params.join('&')}`;
  
  const response = await apiCall(url);
  const data = await response.json();
  renderQuestionBanks(data.questions || []);
}

function renderQuestionBanks(questions) {
  const container = document.getElementById('qbList');
  if (!questions.length) { container.innerHTML = '<div class="loading">No question banks found</div>'; return; }
  container.innerHTML = questions.map(q => `
    <div class="qb-card">
      <div class="qb-info">
        <h4>${q.title || `${q.university} ${q.subject} Question`}</h4>
        <div> ${q.university} • ${q.subject || 'General'}</div>
        <div class="qb-meta"> Year: ${q.year || 'N/A'}</div>
      </div>
      <div>
        <button onclick="window.open('${API_URL}${q.pdf_path}', '_blank')"> View PDF</button>
      </div>
    </div>
  `).join('');
}

async function uploadQuestionBank() {
  const title = document.getElementById('qbTitle').value;
  const university = document.getElementById('qbUniversity').value;
  const subject = document.getElementById('qbSubject').value;
  const year = document.getElementById('qbYear').value;
  const pdfFile = document.getElementById('qbPdf').files[0];
  
  if (!title || !pdfFile) { alert('Title and PDF file required'); return; }
  
  const formData = new FormData();
  formData.append('title', title);
  formData.append('university', university);
  formData.append('subject', subject);
  formData.append('year', year);
  formData.append('pdf', pdfFile);
  
  const response = await fetch(`${API_URL}/admin/question-banks`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${authToken}` },
    body: formData
  });
  
  if (response.ok) { alert('Question bank uploaded!'); loadQuestionBanks(); 
    document.getElementById('qbTitle').value = ''; document.getElementById('qbPdf').value = '';
  } else { alert('Failed to upload'); }
}

async function checkAdmin() {
  const response = await apiCall('/auth/me');
  const data = await response.json();
  if (data.user?.is_admin) { document.getElementById('adminUploadPanel').style.display = 'block'; }
}

async function logout() {
  await apiCall('/auth/logout', { method: 'POST' });
  localStorage.removeItem('path2uni_token');
  window.location.href = 'index.html';
}

if (!authToken) { window.location.href = 'index.html'; } else { loadQuestionBanks(); checkAdmin(); }
</script>
</body>
</html>
