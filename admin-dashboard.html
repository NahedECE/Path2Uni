<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Path2Uni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .users-table { width: 100%; border-collapse: collapse; }
  .users-table th, .users-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .delete-btn { background: rgba(239,68,68,0.2); border: none; color: #f87171; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
  .delete-btn:hover { background: rgba(239,68,68,0.4); }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="page-wrap">
  <nav class="navbar">
    <div class="logo">Path2Uni Admin</div>
    <div class="nav-links">
      <a href="#" class="nav-link" onclick="loadUsers()">Users</a>
      <a href="#" class="nav-link" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="glass-card">
    <div class="sec-title" style="text-align: left;">Registered Users</div>
    <div id="usersList"></div>
  </div>

  <div class="copyright">© 2026 Path2Uni Team. All rights reserved.</div>
</div>

<script>
const API_URL = 'https://path2uni-236v.onrender.com/api';
let authToken = localStorage.getItem('path2uni_token');

async function apiCall(endpoint, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
  return response;
}

async function loadUsers() {
  const response = await apiCall('/users');
  if (response.ok) {
    const data = await response.json();
    const usersList = document.getElementById('usersList');
    
    if (data.users.length === 0) {
      usersList.innerHTML = '<p class="hint">No users registered yet.</p>';
    } else {
      usersList.innerHTML = `
        <table class="users-table">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Registered</th><th>Action</th></tr>
          </thead>
          <tbody>
            ${data.users.map(user => `
              <tr>
                <td>${user.id}</td>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.is_admin ? '👑 Admin' : 'User'}</td>
                <td>${new Date(user.created_at).toLocaleDateString()}</td>
                <td>${!user.is_admin ? `<button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>` : '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
  }
}

async function deleteUser(userId) {
  if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
    const response = await apiCall(`/users/${userId}`, { method: 'DELETE' });
    if (response.ok) {
      alert('User deleted successfully!');
      loadUsers();
    } else {
      alert('Failed to delete user.');
    }
  }
}

function logout() {
  localStorage.removeItem('path2uni_token');
  localStorage.removeItem('path2uni_user');
  window.location.href = 'admin.html';
}

// Check if admin is logged in
const user = JSON.parse(localStorage.getItem('path2uni_user') || '{}');
if (!user.isAdmin) {
  window.location.href = 'admin.html';
}

loadUsers();
</script>
</body>
</html>
