<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circular Archive | Path2Uni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .circular-archive-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.5rem;
    margin-top: 1.5rem;
  }
  .circular-card {
    background: rgba(10,10,26,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 1.5rem;
    transition: all 0.3s;
  }
  .circular-card:hover {
    transform: translateY(-5px);
    border-color: rgba(59,130,246,0.3);
  }
  .circular-card h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    margin-bottom: 0.5rem;
  }
  .circular-meta {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin: 0.5rem 0;
  }
  .pdf-link {
    display: inline-block;
    margin-top: 1rem;
    padding: 8px 16px;
    background: rgba(59,130,246,0.2);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 30px;
    color: #60a5fa;
    text-decoration: none;
    font-size: 12px;
    transition: all 0.2s;
  }
  .pdf-link:hover {
    background: rgba(59,130,246,0.4);
    color: white;
  }
  .filter-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .filter-bar input {
    flex: 1;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px;
    color: white;
  }
  .loading {
    text-align: center;
    padding: 2rem;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="page-wrap">

  <nav class="navbar">
    <div class="logo">Path2Uni</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="eligibility.html" class="nav-link">Eligibility Checker</a>
      <a href="admission-calendar.html" class="nav-link">Admission Calendar</a>
      <a href="study-tracker.html" class="nav-link">Study Tracker</a>
      <a href="circular-archive.html" class="nav-link">Circular Archive</a>
      <a href="question-banks.html" class="nav-link">Question Banks</a>
      <a href="application-status.html" class="nav-link">Application Status</a>
      <a href="#" class="nav-link" onclick="showContactAlert()">Contact Us</a>
      <a href="#" class="nav-link logout-btn" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">All Admission Circulars</div>
    <h1>Circular<br>Archive</h1>
    <p>Browse and download all admission circulars from universities across Bangladesh.</p>
  </div>

  <div class="glass-card">
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search by university or title..." onkeyup="filterCirculars()">
    </div>
    
    <div id="circularsList" class="circular-archive-grid">
      <div class="loading">Loading circulars...</div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://path2uni-236v.onrender.com/api';
const BASE_URL = 'https://path2uni-236v.onrender.com';
let authToken = localStorage.getItem('path2uni_token');
let allCirculars = [];

const user = JSON.parse(localStorage.getItem('path2uni_user') || '{}');
const isAdmin = user.isAdmin === true || user.is_admin === true || user.is_admin === 1;
if (isAdmin) {
  document.querySelector('.nav-links').innerHTML += '<a href="admin-dashboard.html" class="nav-link">Admin Panel</a>';
}

if (!authToken) {
  window.location.href = 'index.html';
}

async function loadCirculars() {
  try {
    const response = await fetch(`${API_URL}/circulars`);
    const data = await response.json();
    allCirculars = data.circulars || [];
    displayCirculars(allCirculars);
  } catch(e) {
    console.error('Error loading circulars:', e);
    document.getElementById('circularsList').innerHTML = '<div class="loading">Error loading circulars</div>';
  }
}

// FIXED: PDF links use BASE_URL not API_URL
function displayCirculars(circulars) {
  const container = document.getElementById('circularsList');
  if (!circulars.length) {
    container.innerHTML = '<div class="loading">No circulars available</div>';
    return;
  }
  
  container.innerHTML = circulars.map(c => {
    let pdfLink = '';
    if (c.pdf_path) {
      const pdfUrl = c.pdf_path.startsWith('http') ? c.pdf_path : `${BASE_URL}${c.pdf_path}`;
      pdfLink = `<a href="${pdfUrl}" target="_blank" class="pdf-link"> Download Circular PDF</a>`;
    }
    
    let applyLink = '';
    if (c.application_link) {
      applyLink = `<a href="${c.application_link}" target="_blank" class="pdf-link" style="margin-left: 10px; background: rgba(59,130,246,0.2);">🌐 Apply Online</a>`;
    }
    
    return `
      <div class="circular-card">
        <h3>${escapeHtml(c.title)}</h3>
        <div class="circular-meta"> ${escapeHtml(c.university)}</div>
        <div class="circular-meta">📅 Deadline: ${c.application_deadline || 'Not specified'}</div>
        <div class="circular-meta"> ${c.description ? c.description.substring(0, 100) + '...' : 'No description'}</div>
        <div>
          ${pdfLink}
          ${applyLink}
        </div>
      </div>
    `;
  }).join('');
}

function filterCirculars() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allCirculars.filter(c => 
    c.title.toLowerCase().includes(searchTerm) || 
    c.university.toLowerCase().includes(searchTerm)
  );
  displayCirculars(filtered);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function showContactAlert() {
  alert('Contact Us:\n\nEmail: support@path2uni.com\nPhone: +880 1234 567890');
}

async function logout() {
  await fetch(`${API_URL}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${authToken}` } });
  localStorage.removeItem('path2uni_token');
  localStorage.removeItem('path2uni_user');
  window.location.href = 'index.html';
}

loadCirculars();
</script>
</body>
</html>
