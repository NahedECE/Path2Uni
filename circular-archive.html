<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circular Archive | Path2Uni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #05050f, #0a0a1a, #0d0d22);
    min-height: 100vh;
    color: white;
  }
  .bg-mesh { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08) 0%, transparent 50%); pointer-events: none; }
  .page-wrap { position: relative; max-width: 1000px; margin: 0 auto; padding: 1.5rem; z-index: 1; }
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.5rem;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(120deg, #fff, #a0a0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .nav-link {
    padding: 0.5rem 1rem;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.2s;
    border-radius: 30px;
  }
  .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
  .glass-card {
    background: rgba(10,10,26,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 1.5rem;
  }
  .filter-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .filter-bar input {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px;
    color: white;
  }
  .admin-upload {
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    display: none;
  }
  .admin-upload input, .admin-upload select, .admin-upload textarea {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: white;
    margin-bottom: 0.5rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  button {
    background: linear-gradient(135deg, #3b82f6, #7c3aed);
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
  }
  .circular-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    margin-bottom: 0.75rem;
    transition: all 0.2s;
  }
  .circular-card:hover { background: rgba(255,255,255,0.06); }
  .circular-info h4 { font-size: 16px; margin-bottom: 4px; }
  .circular-meta { font-size: 11px; color: #fcd34d; margin-top: 4px; }
  .pdf-badge { background: rgba(239,68,68,0.2); padding: 2px 8px; border-radius: 12px; font-size: 10px; }
  @media (max-width: 700px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="page-wrap">
  <nav class="navbar">
    <div class="logo">Path2Uni</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="eligibility.html" class="nav-link">Eligibility Checker</a>
      <a href="admission-calendar.html" class="nav-link">Admission Calendar</a>
      <a href="study-tracker.html" class="nav-link">Study Tracker</a>
      <a href="circular-archive.html" class="nav-link">Circular Archive</a>
      <a href="question-banks.html" class="nav-link">Question Banks</a>
      <a href="application-status.html" class="nav-link">Application Status</a>
      <a href="#" class="nav-link logout-btn" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="glass-card">
    <div class="filter-bar">
      <input type="text" id="searchCircular" placeholder="🔍 Search by title or university..." onkeyup="filterCirculars()">
    </div>

    <div id="adminUploadPanel" class="admin-upload">
      <h3>Admin: Add New Circular</h3>
      <div class="form-row">
        <input type="text" id="circTitle" placeholder="Title">
        <input type="text" id="circUniversity" placeholder="University Name">
      </div>
      <textarea id="circDesc" rows="2" placeholder="Description"></textarea>
      <div class="form-row">
        <input type="date" id="circStart" placeholder="Application Start">
        <input type="date" id="circDeadline" placeholder="Application Deadline">
        <input type="date" id="circExamDate" placeholder="Exam Date">
      </div>
      <div class="form-row">
        <input type="text" id="circLink" placeholder="Application Link">
        <input type="file" id="circPdf" accept=".pdf">
      </div>
      <button onclick="addCircular()">Upload Circular</button>
    </div>

    <div id="circularsList"><div class="loading">Loading circulars...</div></div>
  </div>
</div>

<script>
const API_URL = 'https://path2uni-236v.onrender.com/api';
let authToken = localStorage.getItem('path2uni_token');
let allCirculars = [];

async function apiCall(endpoint, options = {}) {
  const headers = {};
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
  if (response.status === 401) { localStorage.removeItem('path2uni_token'); window.location.href = 'index.html'; }
  return response;
}

async function loadCirculars() {
  const response = await apiCall('/circulars');
  const data = await response.json();
  allCirculars = data.circulars || [];
  renderCirculars(allCirculars);
}

function renderCirculars(circulars) {
  const container = document.getElementById('circularsList');
  if (!circulars.length) { container.innerHTML = '<div class="loading">No circulars available</div>'; return; }
  container.innerHTML = circulars.map(c => `
    <div class="circular-card">
      <div class="circular-info">
        <h4>${c.title}</h4>
        <div>🏛️ ${c.university}</div>
        <div class="circular-meta">📅 Deadline: ${c.application_deadline}</div>
        ${c.description ? `<div class="circular-meta">📝 ${c.description.substring(0, 100)}...</div>` : ''}
      </div>
      <div>
        ${c.application_link ? `<button class="btn-small" style="margin-right: 8px;" onclick="window.open('${c.application_link}', '_blank')">Apply →</button>` : ''}
        ${c.pdf_path ? `<span class="pdf-badge">📄 PDF Available</span>` : ''}
      </div>
    </div>
  `).join('');
}

function filterCirculars() {
  const term = document.getElementById('searchCircular').value.toLowerCase();
  const filtered = allCirculars.filter(c => c.title.toLowerCase().includes(term) || c.university.toLowerCase().includes(term));
  renderCirculars(filtered);
}

async function addCircular() {
  const title = document.getElementById('circTitle').value;
  const university = document.getElementById('circUniversity').value;
  if (!title || !university) { alert('Title and university required'); return; }
  
  const formData = new FormData();
  formData.append('title', title);
  formData.append('university', university);
  formData.append('description', document.getElementById('circDesc').value);
  formData.append('application_start', document.getElementById('circStart').value);
  formData.append('application_deadline', document.getElementById('circDeadline').value);
  formData.append('exam_date', document.getElementById('circExamDate').value);
  formData.append('application_link', document.getElementById('circLink').value);
  formData.append('pdf', document.getElementById('circPdf').files[0]);
  
  const response = await fetch(`${API_URL}/admin/circulars`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${authToken}` },
    body: formData
  });
  
  if (response.ok) { alert('Circular added!'); loadCirculars(); 
    document.getElementById('circTitle').value = ''; document.getElementById('circUniversity').value = '';
    document.getElementById('circDesc').value = ''; document.getElementById('circLink').value = '';
    document.getElementById('circPdf').value = '';
  } else { alert('Failed to add'); }
}

async function checkAdmin() {
  const response = await apiCall('/auth/me');
  const data = await response.json();
  if (data.user?.is_admin) { document.getElementById('adminUploadPanel').style.display = 'block'; }
}

async function logout() {
  await apiCall('/auth/logout', { method: 'POST' });
  localStorage.removeItem('path2uni_token');
  window.location.href = 'index.html';
}

if (!authToken) { window.location.href = 'index.html'; } else { loadCirculars(); checkAdmin(); }
</script>
</body>
</html>
