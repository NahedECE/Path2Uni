<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Calendar | Path2Uni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #05050f, #0a0a1a, #0d0d22);
    min-height: 100vh;
    color: white;
  }
  .bg-mesh { position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08) 0%, transparent 50%); pointer-events: none; }
  .page-wrap { position: relative; max-width: 1200px; margin: 0 auto; padding: 1.5rem; z-index: 1; }
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.5rem;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(120deg, #fff, #a0a0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .nav-link {
    padding: 0.5rem 1rem;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.2s;
    border-radius: 30px;
  }
  .nav-link:hover { color: white; background: rgba(255,255,255,0.05); }
  .glass-card {
    background: rgba(10,10,26,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 1.5rem;
  }
  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .calendar-nav { display: flex; gap: 1rem; }
  .calendar-nav button {
    background: rgba(59,130,246,0.2);
    border: none;
    padding: 8px 16px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    text-align: center;
  }
  .calendar-weekday {
    padding: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
  }
  .calendar-day {
    padding: 10px;
    min-height: 80px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .calendar-day:hover { background: rgba(255,255,255,0.08); }
  .calendar-day.other-month { opacity: 0.3; }
  .calendar-day.today { border: 1px solid #3b82f6; }
  .day-number { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
  .event-dot {
    width: 6px;
    height: 6px;
    background: #ef4444;
    border-radius: 50%;
    position: absolute;
    top: 5px;
    right: 5px;
  }
  .event-list {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .event-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .event-title { font-weight: 600; }
  .event-time { font-size: 11px; color: #fcd34d; }
  button {
    background: linear-gradient(135deg, #3b82f6, #7c3aed);
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
  }
  .admin-panel {
    margin-top: 1.5rem;
    padding: 1rem;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    display: none;
  }
  input, select, textarea {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: white;
    margin-bottom: 0.5rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .calendar-grid { font-size: 10px; } .calendar-day { min-height: 60px; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="page-wrap">
  <nav class="navbar">
    <div class="logo">Path2Uni</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="eligibility.html" class="nav-link">Eligibility Checker</a>
      <a href="admission-calendar.html" class="nav-link">Admission Calendar</a>
      <a href="study-tracker.html" class="nav-link">Study Tracker</a>
      <a href="circular-archive.html" class="nav-link">Circular Archive</a>
      <a href="question-banks.html" class="nav-link">Question Banks</a>
      <a href="application-status.html" class="nav-link">Application Status</a>
      <a href="#" class="nav-link logout-btn" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="glass-card">
    <div class="calendar-header">
      <h2 id="currentMonthYear"></h2>
      <div class="calendar-nav">
        <button onclick="prevMonth()">◀ Previous</button>
        <button onclick="nextMonth()">Next ▶</button>
      </div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    
    <div class="event-list">
      <h3>📅 Upcoming Exams</h3>
      <div id="upcomingEvents"></div>
    </div>

    <div id="adminPanel" class="admin-panel">
      <h3>Admin: Add Exam Date</h3>
      <div class="form-row">
        <input type="text" id="examTitle" placeholder="Exam Title (e.g., BUET Admission Test)">
        <input type="text" id="examUniversity" placeholder="University Name">
      </div>
      <div class="form-row">
        <input type="date" id="examDate">
        <input type="time" id="examTime">
      </div>
      <input type="text" id="examVenue" placeholder="Venue">
      <textarea id="examDesc" rows="2" placeholder="Description"></textarea>
      <button onclick="addExamDate()">Add Exam Date</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://path2uni-236v.onrender.com/api';
let authToken = localStorage.getItem('path2uni_token');
let currentUser = null;
let examDates = [];
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth();

async function apiCall(endpoint, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
  if (response.status === 401) { localStorage.removeItem('path2uni_token'); window.location.href = 'index.html'; }
  return response;
}

async function loadExamDates() {
  const response = await fetch(`${API_URL}/exam-dates`);
  const data = await response.json();
  examDates = data.examDates || [];
  renderCalendar();
  renderUpcomingEvents();
}

function renderCalendar() {
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth + 1, 0);
  const startingDay = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  
  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  document.getElementById('currentMonthYear').textContent = `${monthNames[currentMonth]} ${currentYear}`;
  
  let gridHTML = '';
  const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  weekdays.forEach(day => { gridHTML += `<div class="calendar-weekday">${day}</div>`; });
  
  for (let i = 0; i < startingDay; i++) { gridHTML += `<div class="calendar-day other-month"></div>`; }
  
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const hasEvent = examDates.some(e => e.exam_date === dateStr);
    const isToday = dateStr === new Date().toISOString().split('T')[0];
    gridHTML += `<div class="calendar-day ${isToday ? 'today' : ''}" onclick="showEventsForDate('${dateStr}')">
      <div class="day-number">${day}</div>
      ${hasEvent ? '<div class="event-dot"></div>' : ''}
    </div>`;
  }
  
  document.getElementById('calendarGrid').innerHTML = gridHTML;
}

function renderUpcomingEvents() {
  const today = new Date().toISOString().split('T')[0];
  const upcoming = examDates.filter(e => e.exam_date >= today).sort((a,b) => a.exam_date.localeCompare(b.exam_date));
  const container = document.getElementById('upcomingEvents');
  if (upcoming.length === 0) { container.innerHTML = '<div class="loading">No upcoming exams</div>'; return; }
  container.innerHTML = upcoming.map(e => `
    <div class="event-item">
      <div><div class="event-title">${e.title}</div><div class="event-time">🏛️ ${e.university}</div></div>
      <div><div class="event-time">📅 ${e.exam_date}</div>${e.exam_time ? `<div class="event-time">⏰ ${e.exam_time}</div>` : ''}</div>
    </div>
  `).join('');
}

function showEventsForDate(date) {
  const events = examDates.filter(e => e.exam_date === date);
  if (events.length === 0) { alert(`No exams on ${date}`); return; }
  alert(events.map(e => `${e.title} at ${e.university}${e.exam_time ? ` at ${e.exam_time}` : ''}`).join('\n'));
}

function prevMonth() {
  if (currentMonth === 0) { currentMonth = 11; currentYear--; } else { currentMonth--; }
  renderCalendar();
}

function nextMonth() {
  if (currentMonth === 11) { currentMonth = 0; currentYear++; } else { currentMonth++; }
  renderCalendar();
}

async function addExamDate() {
  const title = document.getElementById('examTitle').value;
  const university = document.getElementById('examUniversity').value;
  const exam_date = document.getElementById('examDate').value;
  const exam_time = document.getElementById('examTime').value;
  const venue = document.getElementById('examVenue').value;
  const description = document.getElementById('examDesc').value;
  
  if (!title || !university || !exam_date) { alert('Please fill title, university, and date'); return; }
  
  const response = await apiCall('/admin/exam-date', {
    method: 'POST',
    body: JSON.stringify({ title, university, exam_date, exam_time, venue, description })
  });
  
  if (response.ok) { alert('Exam date added!'); loadExamDates(); 
    document.getElementById('examTitle').value = ''; document.getElementById('examUniversity').value = '';
    document.getElementById('examDate').value = ''; document.getElementById('examTime').value = '';
    document.getElementById('examVenue').value = ''; document.getElementById('examDesc').value = '';
  } else { alert('Failed to add'); }
}

async function checkAdmin() {
  const response = await apiCall('/auth/me');
  const data = await response.json();
  if (data.user?.is_admin) { document.getElementById('adminPanel').style.display = 'block'; }
}

async function logout() {
  await apiCall('/auth/logout', { method: 'POST' });
  localStorage.removeItem('path2uni_token');
  window.location.href = 'index.html';
}

if (!authToken) { window.location.href = 'index.html'; } else { loadExamDates(); checkAdmin(); }
</script>
</body>
</html>
